<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – DuitPintar</title>
    <style>
        /* style sama seperti about.html, tambahan untuk form */
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background:#f5f7fa; color:#1e293b; padding:0 0 40px; max-width:700px; margin:0 auto; }
        header { background:white; padding:20px 16px; border-bottom:1px solid #e2e8f0; }
        .header-inner { display:flex; align-items:center; justify-content:space-between; }
        .logo { font-size:24px; font-weight:800; color:#0f3b2c; }
        .logo span { color:#d4af37; }
        nav a { color:#475569; text-decoration:none; font-weight:500; margin-left:20px; }
        .container { padding:20px 16px; }
        .static-page { background:white; border-radius:28px; padding:28px 24px; }
        input, textarea { width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:18px; margin-bottom:16px; font-size:16px; }
        .btn { background:#0f3b2c; color:white; border:none; padding:16px; border-radius:50px; font-weight:700; width:100%; }
        footer { text-align:center; margin-top:40px; padding-top:24px; border-top:1px solid #e2e8f0; }
    </style>
</head>
<body>
<header>
    <div class="header-inner">
        <div class="logo">Duit<span>Pintar</span></div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>
</header>
<div class="container">
    <div class="static-page">
        <h2>Contact Us</h2>
        <p>Have a question, suggestion, or business inquiry? Fill out the form below and we'll get back to you within 48 hours.</p>
        <form action="https://formspree.io/f/yourid" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" rows="4" placeholder="Your Message" required></textarea>
            <button type="submit" class="btn">Send Message</button>
        </form>
        <p style="margin-top:20px;">📧 Or email directly: hello@duitpintar.com</p>
    </div>
</div>
<footer>
    <div class="footer-links">
        <a href="index.html">Home</a> | <a href="about.html">About</a> | <a href="contact.html">Contact</a> | <a href="privacy-policy.html">Privacy Policy</a>
    </div>
    <p>© 2025 DuitPintar</p>
</footer>
</body>
</html>
